#!/usr/sbin/nft -f
# Boot-time safety net — restrictive baseline until pigeon-fence activates.
# First boot: allows SSH (Terraform delivers enrollment key) + essential outbound.
# pigeon-enroll.service disables sshd after successful enrollment.
# pigeon-fence replaces this within seconds on subsequent boots (own table, policy drop).
flush ruleset

table inet filter {
  chain input {
    type filter hook input priority 0; policy drop;
    ct state established,related accept
    ct state invalid drop
    iif lo accept
    meta l4proto icmp accept
    meta l4proto icmpv6 accept
    tcp dport 22 accept                    # SSH (Terraform first boot)
    udp dport 51820 accept                 # WireGuard
    tcp dport 7946 accept                  # memberlist
    udp dport 7946 accept                  # memberlist
  }

  chain forward {
    type filter hook forward priority 0; policy drop;
    ct state invalid drop
  }

  chain output {
    type filter hook output priority 0; policy drop;
    ct state established,related accept
    ct state invalid drop
    oif lo accept
    meta l4proto icmp accept
    meta l4proto icmpv6 accept
    udp dport 53 accept                    # DNS
    tcp dport 53 accept                    # DNS
    tcp dport {80, 443} accept             # apt, enrollment
    udp dport 123 accept                   # NTP
    udp dport 51820 accept                 # WireGuard
    tcp dport 7946 accept                  # memberlist
    udp dport 7946 accept                  # memberlist
  }
}
