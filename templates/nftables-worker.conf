#!/usr/sbin/nft -f
flush ruleset

table inet filter {
  chain input {
    type filter hook input priority 0; policy drop;

    iif lo accept
    ct state invalid drop
    ct state established,related accept

    meta l4proto icmp limit rate 25/second accept
    meta l4proto ipv6-icmp limit rate 25/second accept

    # SSH only over WireGuard mesh.
    iifname "wg0" tcp dport 22 accept
    # BGP + BFD for anycast — vRack physical NIC only (not wg0, not bridges).
    iifname != "wg0" iifname != "lo" tcp dport 179 accept
    iifname != "wg0" iifname != "lo" udp dport 3784 accept
    # HAProxy cross-region backhaul (mutual TLS 1.3 over physical IPs).
    iifname != "wg0" iifname != "lo" tcp dport 8443 accept
    # Mesh + bridge rules managed by pigeon-mesh.
  }

  chain forward {
    type filter hook forward priority 0; policy drop;
    ct state invalid drop
    ct state established,related accept
    # Forward rules (wg0 <-> bridge, VM egress) managed by pigeon-mesh.
  }

  chain output {
    type filter hook output priority 0; policy drop;

    oif lo accept
    ct state established,related accept

    # WireGuard mesh.
    udp dport 51820 accept
    # memberlist gossip.
    tcp dport 7946 accept
    udp dport 7946 accept
    # DNS resolution.
    tcp dport 53 accept
    udp dport 53 accept
    # NTP time sync.
    udp dport 123 accept
    # HTTPS (apt repos, OVH API, Let's Encrypt).
    tcp dport 443 accept
    # HTTP (apt repos, OCSP).
    tcp dport 80 accept
    # BGP + BFD for anycast.
    tcp dport 179 accept
    udp dport 3784 accept
    # HAProxy cross-region backhaul (mutual TLS 1.3).
    tcp dport 8443 accept
  }
}
