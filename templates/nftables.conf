#!/usr/sbin/nft -f
flush ruleset

# Bare safety net. pigeon-fence owns service rules at runtime
# via its own table (table inet pigeon-fence, policy drop).
# This table only drops invalid packets. Policy accept ensures
# pigeon-fence rules are authoritative.

table inet filter {
  chain input {
    type filter hook input priority 0; policy accept;
    ct state invalid drop
  }

  chain forward {
    type filter hook forward priority 0; policy accept;
    ct state invalid drop
  }

  chain output {
    type filter hook output priority 0; policy accept;
    ct state invalid drop
  }
}
