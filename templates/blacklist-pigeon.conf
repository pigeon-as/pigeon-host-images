# Kernel module blacklist — pigeon production baseline.
# Deployed to /etc/modprobe.d/blacklist-pigeon.conf
#
# Reference: CIS Ubuntu 24.04 benchmark § 1.1.x

# Uncommon filesystems (CIS § 1.1.1.x)
install cramfs /bin/false
install freevfat /bin/false
install hfs /bin/false
install hfsplus /bin/false
install jffs2 /bin/false
install udf /bin/false

# Uncommon network protocols (CIS § 3.4.x)
install dccp /bin/false
install sctp /bin/false
install rds /bin/false
install tipc /bin/false

# USB storage (servers don't need it)
install usb-storage /bin/false
