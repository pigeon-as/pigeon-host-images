# Pigeon production sysctl settings.
# Applied on boot via /etc/sysctl.d/ drop-in.

# --- BPF hardening ---

# Disable unprivileged BPF — BPF JIT spraying mitigation.
kernel.unprivileged_bpf_disabled = 1

# Harden BPF JIT — constant blinding for BPF programs.
net.core.bpf_jit_harden = 2

# --- Firecracker host settings ---

# Disable core dumps — prevents leaking Vault encryption keys or guest memory.
kernel.core_pattern = |/bin/false
fs.suid_dumpable = 0

# Disable Kernel Samepage Merging — Firecracker prod-host-setup recommends this
# to prevent side-channel attacks via page deduplication between VMs.
kernel.mm.ksm.run = 0

# Disable swap usage — Firecracker and Vault both recommend no swap to prevent
# sensitive data (guest memory, encryption keys) from being paged to disk.
vm.swappiness = 0

# Increase max memory map areas — needed for many concurrent Firecracker VMs.
vm.max_map_count = 1048576

# --- IP forwarding (required for VM networking + WireGuard mesh) ---
net.ipv4.ip_forward = 1
net.ipv6.conf.all.forwarding = 1

# --- Network hardening ---

# Strict reverse-path filtering — drop packets with unreachable source.
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Reject ICMP redirects — prevents route poisoning.
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# Don't send ICMP redirects — we're a router, not a redirect source.
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Reject source-routed packets.
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0

# SYN flood protection.
net.ipv4.tcp_syncookies = 1

# Smurf attack protection.
net.ipv4.icmp_echo_ignore_broadcasts = 1

# --- Network tuning for high connection counts (HAProxy, Consul, Nomad API) ---
net.core.somaxconn = 65535
net.core.netdev_max_backlog = 65535
net.ipv4.tcp_max_syn_backlog = 65535
