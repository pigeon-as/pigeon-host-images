# SSH hardening — pigeon production baseline.
# Deployed to /etc/ssh/sshd_config.d/99-pigeon.conf
#
# Reference: CIS Ubuntu 24.04 benchmark § 5.1.x

# Authentication: key-only, no root password
PermitRootLogin prohibit-password
PasswordAuthentication no
KbdInteractiveAuthentication no
PermitEmptyPasswords no

# Disable unused auth methods
GSSAPIAuthentication no
HostbasedAuthentication no

# Session limits
MaxAuthTries 3
MaxSessions 4
LoginGraceTime 60

# Disable forwarding (not needed for management SSH)
AllowTcpForwarding no
X11Forwarding no
AllowAgentForwarding no
PermitTunnel no

# Crypto: restrict to modern algorithms
KexAlgorithms sntrup761x25519-sha512@openssh.com,curve25519-sha256,curve25519-sha256@libssh.org
Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com
MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com
HostKeyAlgorithms ssh-ed25519,ssh-ed25519-cert-v01@openssh.com

# Logging
LogLevel VERBOSE

# Banner / environment
PermitUserEnvironment no
Banner none
