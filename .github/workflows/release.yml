name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install QEMU
        run: sudo apt-get update && sudo apt-get install -y qemu-system-x86 qemu-utils

      - name: Install Packer
        uses: hashicorp/setup-packer@v3

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build control-plane image
        env:
          PCR_SIGNING_KEY: ${{ secrets.PCR_SIGNING_KEY }}
        run: >
          make build-control-plane
          IMAGE_VERSION=${{ steps.version.outputs.VERSION }}
          SKIP_SIGNING=false

      - name: Build worker image
        env:
          PCR_SIGNING_KEY: ${{ secrets.PCR_SIGNING_KEY }}
        run: >
          make build-worker
          IMAGE_VERSION=${{ steps.version.outputs.VERSION }}
          SKIP_SIGNING=false

      - name: Generate checksums
        run: |
          cd build
          sha256sum \
            control-plane/control-plane.qcow2 \
            worker/worker.qcow2 \
            control-plane/pigeon_${{ steps.version.outputs.VERSION }}.usr.img \
            control-plane/pigeon_${{ steps.version.outputs.VERSION }}.efi \
            worker/pigeon_${{ steps.version.outputs.VERSION }}.usr.img \
            worker/pigeon_${{ steps.version.outputs.VERSION }}.efi \
            > SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/control-plane/control-plane.qcow2
            build/worker/worker.qcow2
            build/control-plane/pigeon_${{ steps.version.outputs.VERSION }}.usr.img
            build/control-plane/pigeon_${{ steps.version.outputs.VERSION }}.efi
            build/worker/pigeon_${{ steps.version.outputs.VERSION }}.usr.img
            build/worker/pigeon_${{ steps.version.outputs.VERSION }}.efi
            build/SHA256SUMS
